<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #2563eb;
            --muted: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 35%),
                        var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        body > * {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        h1, h2 {
            margin: 0;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-top: 2.5rem;
        }

        nav {
            margin: 1.8rem 0;
        }

        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
        }

        section {
            background: var(--card);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 1rem;
            padding: 1.6rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.05);
        }

        section h2 {
            color: var(--text);
            margin-bottom: 0.75rem;
            font-size: 1.5rem;
        }

        p {
            color: var(--muted);
        }

        footer {
            text-align: center;
            padding: 1.5rem 0 2rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <h1>Welcome to the Homepage</h1>
    <p>This is the main page of our website.</p>
    <!-- Create a simple navigation menu -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- create a simple about section -->
    <section>
        <h2>About Us</h2>
        <p>Learn more about our company and mission.</p>
    </section>

    <!-- create a simple contact section -->
    <section>
        <h2>Contact Us</h2>
        <p>Get in touch with us.</p>
    </section>
    <!-- create a simple footer -->
    <footer>
        <p>&copy; 2023 Our Company. All rights reserved.</p>
    </footer>
</body>
</html>
